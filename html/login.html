<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>登录</title>
<style>
body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f6f7f4;color:#1e2a22}
.box{background:#fff;padding:24px 28px;border-radius:12px;border:1px solid #d7ddd8;min-width:300px;box-shadow:0 4px 16px rgba(0,0,0,0.04)}
h2{margin:0 0 16px;font-size:18px;font-weight:600;text-align:center}
input{width:100%;height:38px;padding:0 12px;border:1px solid #d7ddd8;border-radius:8px;box-sizing:border-box;margin-bottom:12px;font-size:14px}
input:focus{outline:none;border-color:#1e2a22}
button{width:100%;height:38px;border:none;background:#1e2a22;color:#fff;border-radius:8px;cursor:pointer;font-size:14px}
button:hover{background:#2c3a30}
.err{color:#9b2b2b;font-size:13px;margin-top:10px;min-height:18px;text-align:center}
</style></head><body>
<div class="box"><h2>登录</h2>
<input id="t" type="password" placeholder="访问密钥" autofocus autocomplete="off"/>
<button onclick="login()">登录</button>
<div id="e" class="err"></div></div>
<script>
async function login(){
  const t=document.getElementById('t').value.trim();const e=document.getElementById('e');
  if(!t){e.textContent='请输入密钥';return;}
  e.textContent='';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});
    if(r.ok){location.reload();}else{e.textContent='密钥错误';}
  }catch(err){e.textContent='请求失败: '+err.message;}
}
document.getElementById('t').addEventListener('keypress',ev=>{if(ev.key==='Enter')login();});
</script></body></html>
